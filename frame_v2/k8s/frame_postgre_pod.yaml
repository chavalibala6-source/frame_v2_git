apiVersion: v1
kind: Pod
metadata:
  name: frame-postgre
  namespace: default
  labels:
    app: frame-postgre
    version: v1
spec:
  restartPolicy: Always
  
  # Shared volumes
  volumes:
  - name: pgdata
    emptyDir: {}
  - name: files
    emptyDir: {}
  - name: data
    emptyDir: {}
  - name: nginx-config
    configMap:
      name: nginx-config
  - name: dnsmasq-config
    configMap:
      name: dnsmasq-config
  - name: ssl-certs
    secret:
      secretName: frame-ssl-secret

  # 4 Containers
  containers:
  
  # Container 1: PostgreSQL Database
  - name: postgres
    image: postgres:15-alpine
    ports:
    - containerPort: 5432
      protocol: TCP
    env:
    - name: POSTGRES_DB
      value: notepad
    - name: POSTGRES_USER
      value: notepad
    - name: POSTGRES_PASSWORD
      value: notepad
    - name: PGDATA
      value: /var/lib/postgresql/data/pgdata
    volumeMounts:
    - name: pgdata
      mountPath: /var/lib/postgresql/data
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    livenessProbe:
      exec:
        command:
        - /bin/sh
        - -c
        - pg_isready -U notepad
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      exec:
        command:
        - /bin/sh
        - -c
        - pg_isready -U notepad
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 2

  # Container 2: Flask Web App
  - name: web
    image: frame_v2-web:latest
    imagePullPolicy: Never
    ports:
    - containerPort: 5000
      protocol: TCP
    env:
    - name: FLASK_ENV
      value: production
    - name: DB_HOST
      value: localhost
    - name: DB_NAME
      value: notepad
    - name: DB_USER
      value: notepad
    - name: DB_PASSWORD
      value: notepad
    volumeMounts:
    - name: files
      mountPath: /app/files
    - name: data
      mountPath: /app/data
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"
    livenessProbe:
      httpGet:
        path: /list
        port: 5000
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /list
        port: 5000
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 2

  # Container 3: Nginx Reverse Proxy
  - name: nginx
    image: nginx:latest
    ports:
    - containerPort: 80
      protocol: TCP
    - containerPort: 443
      protocol: TCP
    volumeMounts:
    - name: nginx-config
      mountPath: /etc/nginx/conf.d
      readOnly: true
    - name: ssl-certs
      mountPath: /etc/nginx/ssl
      readOnly: true
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"
    livenessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 2
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 2

  # Container 4: DNS (dnsmasq)
  - name: dns
    image: andyshinn/dnsmasq:latest
    ports:
    - containerPort: 53
      protocol: TCP
    - containerPort: 53
      protocol: UDP
    volumeMounts:
    - name: dnsmasq-config
      mountPath: /etc/dnsmasq.conf
      subPath: dnsmasq.conf
      readOnly: true
    securityContext:
      capabilities:
        add:
        - NET_ADMIN
    resources:
      requests:
        memory: "32Mi"
        cpu: "25m"
      limits:
        memory: "64Mi"
        cpu: "50m"
    livenessProbe:
      exec:
        command:
        - nslookup
        - localhost
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3

  # Security context for the pod
  securityContext:
    runAsNonRoot: false
    runAsUser: 0

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: default
data:
  default.conf: |
    upstream web {
      server localhost:5000;
    }

    server {
      listen 80;
      server_name _;

      location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /static/ {
        alias /app/static/;
        expires 30d;
      }
    }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dnsmasq-config
  namespace: default
data:
  dnsmasq.conf: |
    # dnsmasq configuration
    listen-address=127.0.0.1
    address=/frame.local/127.0.0.1
    no-resolv
    server=8.8.8.8
    server=8.8.4.4

