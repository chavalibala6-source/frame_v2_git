        let _activeVideoId = null;
        let _lockActive = false;
        let _snapBackup = null;

        function getActiveIndexByCenter(row) {
            const containers = row.querySelectorAll('.video-container');
            if (!containers || containers.length === 0) return 0;

            const rowRect = row.getBoundingClientRect();
            const rowCenter = rowRect.left + rowRect.width / 2;
            let bestIdx = 0;
            let bestDist = Infinity;

            containers.forEach((c, i) => {
                const rect = c.getBoundingClientRect();
                const center = rect.left + rect.width / 2;
                const dist = Math.abs(center - rowCenter);
                if (dist < bestDist) {
                    bestDist = dist;
                    bestIdx = i;
                }
            });

            return bestIdx;
        }

        function findContainerByVideoId(row, videoId) {
            if (!videoId) return null;
            return row.querySelector(`.video-container[data-video-id="${videoId}"]`);
        }

        function resolveActiveContainer(row) {
            if (_activeContainer && row.contains(_activeContainer)) return _activeContainer;
            const byId = findContainerByVideoId(row, _activeVideoId);
            if (byId) return byId;
            const idx = getActiveIndexByCenter(row);
            const containers = row.querySelectorAll('.video-container');
            return containers[idx] || null;
        }

        function rememberActiveIndex() {
            const row = document.querySelector('.video-row');
            if (!row) return;
            _activeContainer = resolveActiveContainer(row);
            const containers = row.querySelectorAll('.video-container');
            _lastActiveIndex = _activeContainer ? Array.from(containers).indexOf(_activeContainer) : getActiveIndexByCenter(row);
            if (_activeContainer) {
                _activeVideoId = _activeContainer.dataset.videoId || null;
            }
        }

        function realignCarouselToActive() {
            const row = document.querySelector('.video-row');
            if (!row) return;
            const containers = row.querySelectorAll('.video-container');
            if (!containers || containers.length === 0) return;

            const clamped = Math.max(0, Math.min(_lastActiveIndex, containers.length - 1));
            const target = resolveActiveContainer(row) || containers[clamped];
            _activeContainer = target;
            _activeVideoId = target ? (target.dataset.videoId || _activeVideoId) : _activeVideoId;

            const rowRect = row.getBoundingClientRect();
            const targetRect = target.getBoundingClientRect();
            const rowCenter = rowRect.left + rowRect.width / 2;
            const targetCenter = targetRect.left + targetRect.width / 2;
            const delta = targetCenter - rowCenter;
            const nextLeft = row.scrollLeft + delta;

            row.scrollTo({ left: nextLeft, behavior: 'smooth' });
            updateIndicators();

            if (_snapBackup !== null) {
                row.style.scrollSnapType = _snapBackup;
                _snapBackup = null;
            }
            _lockActive = false;
        }

        function updateIndicators() {
            const row = document.querySelector('.video-row');
            const indicators = document.querySelectorAll('.dot');
            if (!row || indicators.length === 0) return;

            const containers = row.querySelectorAll('.video-container');
            let activeIndex = getActiveIndexByCenter(row);
            if (_lockActive) {
                const locked = resolveActiveContainer(row);
                if (locked) {
                    activeIndex = Array.from(containers).indexOf(locked);
                }
            } else {
                _activeContainer = containers[activeIndex] || null;
                _activeVideoId = _activeContainer ? (_activeContainer.dataset.videoId || _activeVideoId) : _activeVideoId;
            }
            _lastActiveIndex = Math.max(0, activeIndex);

            containers.forEach((c, i) => {
                c.classList.toggle('is-active', i === activeIndex);
            });

            indicators.forEach((dot, i) => {
                dot.classList.toggle('active', i === activeIndex);
                // reset fills for non-active
                const f = dot.querySelector('.dot-fill');
                if (f && i !== activeIndex) f.style.width = '0%';
            });

            // Update the active dot fill from player state
            updatePillProgress();
        }

        function insertVideo() {
            let input = prompt("Paste YouTube URL (Video or Playlist):");
            if (!input) return;
            input = input.trim();

            // 1. Try to find a Video ID
            // Supports: youtube.com/watch?v=ID, youtu.be/ID, youtube.com/embed/ID, youtube.com/shorts/ID
            const videoMatch = input.match(
                /(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([\w-]{11})/
            );

            // 2. Try to find a Playlist ID
            // Supports: ?list=ID, &list=ID
            const listMatch = input.match(/[?&]list=([a-zA-Z0-9_-]+)/);

            let embedUrl = null;

            if (videoMatch && listMatch) {
                // Video + Playlist (watch?v=...&list=...)
                embedUrl = `https://www.youtube.com/embed/${videoMatch[1]}?list=${listMatch[1]}&enablejsapi=1`;
            } else if (videoMatch) {
                // Single Video
                embedUrl = `https://www.youtube.com/embed/${videoMatch[1]}?enablejsapi=1`;
            } else if (listMatch) {
                // Playlist Only (playlist?list=...)
                embedUrl = `https://www.youtube.com/embed?listType=playlist&list=${listMatch[1]}&enablejsapi=1`;
            } else {
                // Fallback: Check if it's a raw playlist URL without 'watch' or 'embed' nicely formatted
                // e.g. youtube.com/playlist?list=ID
                if (input.includes("youtube.com") && listMatch) {
                    embedUrl = `https://www.youtube.com/embed?listType=playlist&list=${listMatch[1]}&enablejsapi=1`;
                } else {
                    alert("Only YouTube links are supported (Video or Playlist)");
                    return;
                }
            }

            const row = getOrCreateVideoCarousel();

            // Create the container
            // We use 'allow-popups' etc to ensure playlist UI works well
            const containerId = videoMatch ? `video:${videoMatch[1]}` : (listMatch ? `list:${listMatch[1]}` : `vid:${Date.now()}`);
            row.insertAdjacentHTML("beforeend", `
        <div class="video-container" data-video-id="${containerId}">
            <div class="video-card">
                <button class="video-delete" onclick="deleteVideo(this)">✕</button>
                <iframe src="${embedUrl}" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen></iframe>
            </div>
        </div>
    `);

            // Initialize the new player immediately if possible
            // Note: API might not pick it up until page reload unless we manually init
            // But our MutationObserver or initYouTubePlayers logic handles batch inits usually
            // Ideally we push to ytPlayers
            setTimeout(() => {
                const newIframe = row.lastElementChild.querySelector('iframe');
                try {
                    const idx = ytPlayers.length;
                    const player = new YT.Player(newIframe, {
                        events: {
                            onStateChange: onPlayerStateChange,
                            onError: onPlayerError
                        }
                    });
                    newIframe.dataset.playerId = idx;
                    ytPlayers.push(player);
                } catch (e) { }
            }, 1000);

            saveServer();
            renderIndicators(); // Refresh dots
            scheduleDeleteHide();
            status.textContent = "Video/Playlist added";
            setTimeout(() => status.textContent = "Ready", 2000);
        }

                        let _lastTime = Date.now();

                        xhr.upload.onprogress = function (evt) {
                            if ((!bar && !label) || !evt.lengthComputable) return;
                            const pct = Math.round((evt.loaded / evt.total) * 100);

                                const dt = Math.max(1, now - _lastTime) / 1000;
                                const dBytes = Math.max(0, evt.loaded - _lastLoaded);
                                const speed = dBytes / dt;
                                const remaining = Math.max(0, evt.total - evt.loaded);
                                const eta = speed > 0 ? Math.ceil(remaining / speed) : 0;
                                label.textContent = `${formatBytes(evt.loaded)} / ${formatBytes(evt.total)} • ${formatBytes(speed)}/s • ${formatETA(eta)}`;
                                _lastTime = now;
                                _lastLoaded = evt.loaded;
                            }
                        };
                        xhr.onload = function () {
                            if (!placeholder) {
                                resolve();
                                return;
                            }
                            if (xhr.status >= 200 && xhr.status < 300) {
                                let data = null;
                                try { data = JSON.parse(xhr.responseText); } catch (e) { }
                                const url = data && data.url ? data.url : null;
                                if (!url) {
                                    placeholder.remove();
                                    resolve();
                                    return;
                                }
                                placeholder.querySelector('.video-card').innerHTML = `
                                    <button class="video-delete" onclick="deleteVideo(this)">✕</button>
                                    <button class="video-audio-toggle" onclick="toggleVideoAudio(this)" title="Mute/Unmute">
                                        <i data-lucide="volume-2"></i>
                                    </button>
                                    <video src="${url}" controls playsinline></video>
                                    <a class="video-download" href="${url}" download>Download</a>
                                `;
                                const localVideo = placeholder.querySelector('video');
                                setupLocalVideoPreview(localVideo);
                                syncAudioButton(localVideo);
                                renderIndicators();
                                scheduleDeleteHide();
                                ensureVideoObserver();
                                saveServer();
                                resolve();
                            } else {
                                placeholder.remove();
                                resolve();
                            }
                        };
                        xhr.onerror = function () {
                            if (placeholder) placeholder.remove();
                            resolve();
                        };
                        xhr.send(formData);
                    });
                }
            }
            this.value = ""; // Reset
        });

        function formatBytes(bytes) {
            if (!bytes || bytes <= 0) return "0 MB";
            const units = ["B", "KB", "MB", "GB", "TB"];
            const i = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
            const val = bytes / Math.pow(1024, i);
            const digits = val >= 100 ? 0 : val >= 10 ? 1 : 2;
            return `${val.toFixed(digits)} ${units[i]}`;
        }

        function formatETA(seconds) {
            if (!seconds || seconds <= 0) return "0s";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            if (m <= 0) return `${s}s`;
            return `${m}m ${s}s`;
        }


        let _imageSaveTimer = null;
        function scheduleImageSave() {
            clearTimeout(_imageSaveTimer);
            _imageSaveTimer = setTimeout(() => saveServer(), 1200);
        }

        function createImagePlaceholder(row, filename) {
            const tempId = `img:${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
            const html = `
                <div class="image-container" data-upload-id="${tempId}">
                    <button class="image-delete" onclick="deleteImage(this)">✕</button>
                    <div class="image-select">✓</div>
                    <div class="image-card">
                        <div class="upload-progress">
                            <div class="upload-bar"></div>
                            <div class="upload-text">0 MB / 0 MB</div>
                        </div>
                    </div>
                </div>
            `;
            row.insertAdjacentHTML('beforeend', html);
            return row.querySelector(`.image-container[data-upload-id="${tempId}"]`);
        }

        function uploadImageFile(file) {
            return new Promise(resolve => {
                const container = getOrCreateImageCarousel();
                const row = container.querySelector('.image-row');
                const placeholder = createImagePlaceholder(row, file.name);
                renderImageIndicators();

                const bar = placeholder ? placeholder.querySelector('.upload-bar') : null;
                const label = placeholder ? placeholder.querySelector('.upload-text') : null;
                const formData = new FormData();
                formData.append("image", file);

                const xhr = new XMLHttpRequest();
                xhr.open("POST", `/upload_image`, true);
                let _lastTime = Date.now();
                let _lastLoaded = 0;

                xhr.upload.onprogress = function (evt) {
                    if ((!bar && !label) || !evt.lengthComputable) return;
                    const pct = Math.round((evt.loaded / evt.total) * 100);
                    if (bar) bar.style.width = pct + '%';
                    if (label) {
                        const now = Date.now();
                        const dt = Math.max(1, now - _lastTime) / 1000;
                        const dBytes = Math.max(0, evt.loaded - _lastLoaded);
                        const speed = dBytes / dt;
                        const remaining = Math.max(0, evt.total - evt.loaded);
                        const eta = speed > 0 ? Math.ceil(remaining / speed) : 0;
                        label.textContent = `${formatBytes(evt.loaded)} / ${formatBytes(evt.total)} • ${formatBytes(speed)}/s • ${formatETA(eta)}`;
                        _lastTime = now;
                        _lastLoaded = evt.loaded;
                    }
                };

                xhr.onload = function () {
                    if (!placeholder) {
                        resolve();
                        return;
                    }
                    if (xhr.status >= 200 && xhr.status < 300) {
                        let data = null;
                        try { data = JSON.parse(xhr.responseText); } catch (e) { }
                        const url = data && data.url ? data.url : null;
                        if (!url) {
                            placeholder.remove();
                            resolve();
                            return;
                        }
                        const fileMatch = url.match(/\/static\/uploads\/([^?#]+)/);
                        if (fileMatch && fileMatch[1]) {
                            placeholder.dataset.file = fileMatch[1];
                        }
                        placeholder.querySelector('.image-card').innerHTML = `
                            <img src="${url}" alt="Image" />
                        `;
                        renderImageIndicators();
                        scheduleImageSave();
                        resolve();
                    } else {
                        placeholder.remove();
                        resolve();
                    }
                };
                xhr.onerror = function () {
                    if (placeholder) placeholder.remove();
                    resolve();
                };
                xhr.send(formData);
            });
        }

        async function uploadImagesInBatches(files, maxConcurrent = 3) {
            const queue = Array.from(files);
            const workers = [];
            for (let i = 0; i < maxConcurrent; i++) {
                workers.push((async () => {
                    while (queue.length) {
                        const file = queue.shift();
                        await uploadImageFile(file);
                    }
                })());
            }
            await Promise.all(workers);
            renderImageIndicators();
            scheduleImageSave();
        }

        document.getElementById("imgInput").addEventListener("change", async function () {
            if (this.files && this.files.length > 0) {
                await uploadImagesInBatches(this.files, 3);
            }
            this.value = ""; // Reset
        });

        function setColor(color) {
            paper.focus(); // Ensure focus
            document.execCommand("foreColor", false, color);
        }

        function highlight() {
            paper.focus();
            document.execCommand("hiliteColor", false, "#fff59d");
        }

        /* Markdown Detection */
        paper.addEventListener("keydown", e => {
            if (!markdownMode || (e.key !== " " && e.key !== "Enter")) return;

            const sel = window.getSelection();
            const node = sel.anchorNode;
            if (!node || node.nodeType !== 3) return;

            const text = node.textContent;
            const match = text.match(/^(#{1,3})\s$/);

            if (match) {
                e.preventDefault();
                const level = match[1].length;
                document.execCommand("selectAll", false);
                document.execCommand("delete", false);
                document.execCommand("formatBlock", false, "h" + level);
            }
        });

        function updateCount() {
            const lines = paper.innerText.split("\n").length;
            count.textContent = `${lines} lines`;
        }

        /* Focus on Click */
        paper.addEventListener("click", e => {
            if (e.target === paper) {
                article.focus();
                // Move cursor to end
                const range = document.createRange();
                range.selectNodeContents(article);
                range.collapse(false);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            }
        });

        /* Autosave Logic */
        paper.addEventListener("input", () => {
            if (current && !sourceMode) {
                docs[current] = paper.innerHTML;
                isDirty = true;
            }
            updateCount();
            localStorage.setItem("docs", JSON.stringify(docs));

            // Debounced Cloud Sync
            if (current) {
                clearTimeout(saveTimeout);
                status.textContent = "Syncing...";
                saveTimeout = setTimeout(() => {
                    saveServer();
                }, 2000); // 2 second debounce
            }
        });

        /* Shortcuts */
        document.addEventListener("keydown", e => {
            const k = e.key.toLowerCase();
            const mod = e.ctrlKey || e.metaKey;

            if (!mod) return;

            switch (k) {
                case "n":
                    e.preventDefault();
                    newDoc();
                    break;

                case "s":
                    e.preventDefault();
                    if (e.shiftKey) saveServer();
                    else downloadDoc();
                    break;

                case "o":
                    e.preventDefault();
                    openServerList();
                    break;

                case "f":
                    e.preventDefault();
                    document.getElementById("findTxt").focus();
                    break;

                case "h":
                    e.preventDefault();
                    document.getElementById("replaceTxt").focus();
                    break;

                case "m":
                    e.preventDefault();
                    toggleMarkdown();
                    break;

                case "p":
                    e.preventDefault();
                    window.print();
                    break;

                case "b":
                    e.preventDefault();
                    document.execCommand("bold");
                    break;

                case "i":
                    e.preventDefault();
                    document.execCommand("italic");
                    break;

                case "u":
                    e.preventDefault();
                    document.execCommand("underline");
                    break;

                case "g":
                    e.preventDefault();
                    insertGroup();
                    break;

                case "l":
                    e.preventDefault();
                    highlight();
                    break;

                case "w": // Try to override Close Tab (doesn't work in all browsers)
                case "q": // Alternative
                    e.preventDefault();
                    if (current) closeDoc(current);
                    break;
            }
        });

        /* Init */
      window.onload = function () {
    // Restore Theme
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
    }

    // Restore Background
    if (localStorage.getItem('hide-bg') === 'true') {
        document.body.classList.add('hide-bg');
    }

    // Fetch doc list from backend and open last opened doc only
    (async function() {
        try {
            const lRes = await fetch('/list');
            const files = await lRes.json();
            if (files.length > 0) {
                // Build docs map from server list
                docs = {};
                files.forEach(f => { docs[f] = null; });
                closedDocs = closedDocs.filter(d => docs[d] !== undefined);
                saveClosedDocs();

                // Only open if user previously had a doc open
                const stored = localStorage.getItem("currentDoc");
                if (stored && docs[stored] !== undefined && !isClosedDoc(stored)) {
                    current = stored;
                    renderTabs();
                    await openDoc(current);
                } else {
                    current = null;
                    renderTabs();
                    article.innerHTML = "";
                    article.contentEditable = "false";
                    status.textContent = "Ready";
                }
            } else {
                closedDocs = [];
                saveClosedDocs();
                current = null;
                localStorage.removeItem("currentDoc");
                article.innerHTML = "";
                article.contentEditable = "false";
                renderTabs();
                status.textContent = "Ready";
            }
        } catch (e) {
            article.innerHTML = "";
            status.textContent = "Ready: No document";
        }
        lucide.createIcons();
        syncWithServer();
    })();
};

        async function syncWithServer() {
            if (isSyncing) return;
            isSyncing = true;

            try {
            const res = await fetch("/last_modified");
            const m = await res.json();

            if (m.last_mod !== lastSyncTime) {
                const lRes = await fetch("/list");
                let files = await lRes.json();

                    // Remove docs no longer on server
                    Object.keys(docs).forEach(d => {
                        if (!files.includes(d)) delete docs[d];
                    });

                // Add new files as null (unloaded)
                files.forEach(f => {
                    if (!docs[f]) docs[f] = null;
                });

                // Clean up closed docs that no longer exist
                closedDocs = closedDocs.filter(d => docs[d] !== undefined);
                saveClosedDocs();

                    // Fetch and display content for current doc if not loaded
                    if (current && (docs[current] === null || docs[current] === undefined)) {
                        try {
                            const res = await fetch("/open", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({ name: current })
                            });
                            if (res.ok) {
                                const data = await res.json();
                                docs[current] = data.content || "";
                                article.innerHTML = docs[current];
                            }
                        } catch (e) {
                            article.innerHTML = "";
                        }
                    } else if (current && docs[current] !== undefined) {
                        article.innerHTML = docs[current];
                    }

                    renderTabs();
                    lastSyncTime = m.last_mod;
                    localStorage.setItem("docs", JSON.stringify(docs));
                }
            } catch (e) {
                console.error("Sync error:", e);
            } finally {
                isSyncing = false;
                setTimeout(syncWithServer, 10000);
            }
        }

        function initVideoControls() {
            // Initialize resizers
            document.querySelectorAll('.resizer').forEach(resizer => {
                if (resizer.dataset.handled) return;
                const container = resizer.parentElement;

                let startX, startWidth;

                const startResize = (e) => {
                    const point = e.type === 'touchstart' ? e.touches[0] : e;
                    startX = point.clientX;
                    startWidth = container.offsetWidth;

                    document.body.classList.add('resizing');
                    paper.style.pointerEvents = "none";

                    const resizing = (ev) => {
                        if (ev.type === 'touchmove') ev.preventDefault();
                        const p = ev.type === 'touchmove' ? ev.touches[0] : ev;
                        const diff = p.clientX - startX;
                        container.style.width = (startWidth + diff) + 'px';
                    };

                    const endResize = () => {
                        document.body.classList.remove('resizing');
                        paper.style.pointerEvents = "auto";
                        window.removeEventListener('mousemove', resizing, { capture: true });
                        window.removeEventListener('mouseup', endResize, { capture: true });
                        window.removeEventListener('touchmove', resizing, { capture: true });
                        window.removeEventListener('touchend', endResize, { capture: true });

                        // Sync new size to server
                        saveServer();
                    };

                    window.addEventListener('mousemove', resizing, { capture: true });
                    window.addEventListener('mouseup', endResize, { capture: true });
                    window.addEventListener('touchmove', resizing, { capture: true, passive: false });
                    window.addEventListener('touchend', endResize, { capture: true });
                };

                resizer.addEventListener('mousedown', startResize);
                resizer.addEventListener('touchstart', startResize);
                resizer.dataset.handled = "true";
            });

            // Initialize movers
            document.querySelectorAll('.mover').forEach(mover => {
                if (mover.dataset.handled) return;
                const container = mover.parentElement;

                let startX, startY, startLeft, startTop;

                const startMove = (e) => {
                    e.preventDefault();
                    const point = e.type === 'touchstart' ? e.touches[0] : e;
                    startX = point.clientX;
                    startY = point.clientY;

                    // Switch to absolute if not already
                    if (window.getComputedStyle(container).position !== 'absolute') {
                        const rect = container.getBoundingClientRect();
                        const paperRect = paper.getBoundingClientRect();
                        container.style.position = 'absolute';
                        container.style.left = (rect.left - paperRect.left) + 'px';
                        container.style.top = (rect.top - paperRect.top + paper.scrollTop) + 'px';
                        container.style.margin = '0';
                    }

                    startLeft = parseFloat(container.style.left) || 0;
                    startTop = parseFloat(container.style.top) || 0;

                    container.classList.add('dragging');
                    document.body.classList.add('resizing'); // Shield
                    paper.style.pointerEvents = "none";

                    const moving = (ev) => {
                        if (ev.type === 'touchmove') ev.preventDefault();
                        const p = ev.type === 'touchmove' ? ev.touches[0] : ev;
                        const dx = p.clientX - startX;
                        const dy = p.clientY - startY;
                        container.style.left = (startLeft + dx) + 'px';
                        container.style.top = (startTop + dy) + 'px';
                    };

                    const endMove = () => {
                        container.classList.remove('dragging');
                        document.body.classList.remove('resizing');
                        paper.style.pointerEvents = "auto";
                        window.removeEventListener('mousemove', moving, { capture: true });
                        window.removeEventListener('mouseup', endMove, { capture: true });
                        window.removeEventListener('touchmove', moving, { capture: true });
                        window.removeEventListener('touchend', endMove, { capture: true });

                        // Sync new position to server
                        saveServer();
                    };

                    window.addEventListener('mousemove', moving, { capture: true });
                    window.addEventListener('mouseup', endMove, { capture: true });
                    window.addEventListener('touchmove', moving, { capture: true, passive: false });
                    window.addEventListener('touchend', endMove, { capture: true });
                };

                mover.addEventListener('mousedown', startMove);
                mover.addEventListener('touchstart', startMove);
                mover.dataset.handled = "true";
            });
        }

    </script>
    <script>
        let _videoObserver = null;
        let _activeLocalContainer = null;

        function ensureVideoObserver() {
            if (!('IntersectionObserver' in window)) return;
            if (!_videoObserver) {
                _videoObserver = new IntersectionObserver(
                    (entries) => {
                        entries.forEach(entry => {
                            const container = entry.target;
                            const video = container.querySelector('video');
                            if (!video) return;

                            if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
                                _activeLocalContainer = container;
                            } else {
                                // Pause when off-screen
                                video.pause();
                                video.muted = true;
                                video.dataset.userMuted = "false";
                                syncAudioButton(video);
                            }
                        });
                    },
                    { threshold: [0.6] }
                );
            }

            document.querySelectorAll('.video-container').forEach(c => _videoObserver.observe(c));
        }

        (() => {
            let lastTap = 0;

            /* ===============================
               DOUBLE TAP / DOUBLE CLICK
            =============================== */
            document.addEventListener('click', (e) => {
                const container = e.target.closest('.video-container');
                if (!container) return;

                const now = Date.now();
                if (now - lastTap < 300) {
                    container.classList.toggle('cinematic');
                }
                lastTap = now;
            });

            /* ===============================
               AUTO-MUTE NON-FOCUSED VIDEOS
            =============================== */
            ensureVideoObserver();
        })();
    </script>

        function cmd(command, value = null) {
            document.execCommand(command, false, value);
        }
